<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Portal | Cochran Films</title>
    
    <!-- Favicon -->
    <link rel="icon" href="Favicon.png" type="image/png">
    
    <!-- Fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        let currentUser = null;
        let freelancers = [];
        let uploadedContracts = [];

        // Load freelancer data
        function loadFreelancerData() {
            try {
                // Try to load from localStorage first (admin dashboard format)
                let data = JSON.parse(localStorage.getItem('freelancers') || '[]');
                
                // If localStorage is empty or not an array, try to load from JSON file structure
                if (!Array.isArray(data) || data.length === 0) {
                    // Check if we have the JSON file structure in localStorage
                    const jsonData = localStorage.getItem('approvedFreelancers');
                    if (jsonData) {
                        const parsedJsonData = JSON.parse(jsonData);
                        if (parsedJsonData.approvedFreelancers) {
                            // Convert the JSON structure to array format
                            data = Object.entries(parsedJsonData.approvedFreelancers).map(([name, freelancer]) => ({
                                name: name,
                                email: freelancer.email,
                                password: freelancer.password,
                                role: freelancer.role,
                                location: freelancer.location,
                                projectStart: freelancer.projectStart,
                                rate: freelancer.rate,
                                approvedDate: freelancer.approvedDate,
                                contractUrl: freelancer.contractUrl
                            }));
                        }
                    } else {
                        // Fallback: manually load the known freelancers for testing
                        data = [
                            {
                                name: "Francisco Flores",
                                email: "ciscocinema@gmail.com",
                                password: "Cinema2025",
                                role: "Backdrop Photographer",
                                location: "6695 Church Street, Douglasville, GA 30134",
                                projectStart: "November 8, 2025 at 3:15 PM",
                                rate: "$400.00 USD (Flat)",
                                approvedDate: "2024-01-08",
                                contractUrl: "contract.html"
                            },
                            {
                                name: "Test User",
                                email: "codylcochran87@gmail.com",
                                password: "Test12345",
                                role: "Video Editor",
                                location: "Alanta, GA",
                                projectStart: "August 19th, 2025 at 2:00pm",
                                rate: "$450.00 USD (Flat)",
                                approvedDate: "2025-04-13",
                                contractUrl: "contract.html"
                            },
                            {
                                name: "Hannah Aryee",
                                email: "hannah@luciacreates.co",
                                password: "Collaboration2025",
                                role: "Backdrop Photographer",
                                location: "6700 Church Street, Douglasville, GA,  30134",
                                projectStart: "October 24, 2025 at 3:15 PM",
                                rate: "$300 + Tip",
                                approvedDate: "2025-08-01",
                                contractUrl: "contract.html"
                            }
                        ];
                    }
                }
                
                freelancers = data;
                console.log('✅ Freelancer data loaded:', freelancers.length, 'freelancers');
                console.log('🔍 Available freelancers:', freelancers.map(f => ({ name: f.name, email: f.email })));
            } catch (error) {
                console.error('❌ Error loading freelancer data:', error);
                freelancers = [];
            }
        }

        // Load uploaded contracts
        function loadUploadedContracts() {
            try {
                const data = JSON.parse(localStorage.getItem('uploadedContracts') || '[]');
                uploadedContracts = data;
                console.log('✅ Uploaded contracts loaded:', uploadedContracts.length, 'contracts');
            } catch (error) {
                console.error('❌ Error loading uploaded contracts:', error);
                uploadedContracts = [];
            }
        }

        // Handle login
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            // Find user in freelancers data
            const user = freelancers.find(f => f.email.toLowerCase() === email.toLowerCase() && f.password === password);
            
            if (user) {
                currentUser = user;
                sessionStorage.setItem('userPortalAuthenticated', JSON.stringify(user));
                showUserPortal();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // Show user portal
        function showUserPortal() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('userPortal').style.display = 'block';
            loadUserData();
        }

        // Show login screen
        function showLoginScreen() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('userPortal').style.display = 'none';
            currentUser = null;
        }

        // Load user-specific data
        function loadUserData() {
            if (!currentUser) return;

            // Update welcome message
            document.getElementById('userName').textContent = currentUser.name;
            
            // Display user info
            displayUserInfo();
            displayUserContracts();
            displayUserJobs();
        }

        // Display user information
        function displayUserInfo() {
            const container = document.getElementById('userInfo');
            container.innerHTML = `
                <div class="info-card">
                    <h3>👤 Your Profile</h3>
                    <div class="info-grid">
                        <div><strong>Name:</strong> ${currentUser.name}</div>
                        <div><strong>Email:</strong> ${currentUser.email}</div>
                        <div><strong>Role:</strong> ${currentUser.role}</div>
                        <div><strong>Location:</strong> ${currentUser.location}</div>
                        <div><strong>Rate:</strong> ${currentUser.rate}</div>
                        <div><strong>Project Start:</strong> ${currentUser.projectStart}</div>
                    </div>
                </div>
            `;
        }

        // Display user contracts
        function displayUserContracts() {
            const container = document.getElementById('userContracts');
            
            // Find contracts for this user
            const userContracts = uploadedContracts.filter(contract => 
                contract.freelancerEmail.toLowerCase() === currentUser.email.toLowerCase()
            );

            if (userContracts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>📋 No Signed Contracts Yet</h3>
                        <p>Your signed contracts will appear here once they've been processed.</p>
                        <a href="contract.html" class="btn">Sign Contract</a>
                    </div>
                `;
                return;
            }

            const contractsHTML = userContracts.map((contract, index) => `
                <div class="contract-card">
                    <div class="contract-header">
                        <h4>${contract.role}</h4>
                        <span class="status-badge">✅ SIGNED</span>
                    </div>
                    <div class="contract-details">
                        <div><strong>Contract ID:</strong> ${contract.contractId}</div>
                        <div><strong>Date:</strong> ${new Date(contract.uploadDate).toLocaleDateString()}</div>
                        <div><strong>Rate:</strong> ${contract.rate}</div>
                        <div><strong>Location:</strong> ${contract.location}</div>
                    </div>
                    <div class="contract-actions">
                        <button class="btn btn-small" onclick="downloadUserContract(${index})">
                            <i class="fas fa-download"></i> Download PDF
                        </button>
                        <button class="btn btn-small" onclick="viewContractDetails(${index})">
                            <i class="fas fa-eye"></i> View Details
                        </button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = contractsHTML;
        }

        // Display user jobs
        function displayUserJobs() {
            const container = document.getElementById('userJobs');
            
            if (!currentUser) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>❌ User Data Missing</h3>
                        <p>Unable to load job information.</p>
                    </div>
                `;
                return;
            }

            // For now, display the user's current job info from their profile
            // In the future, this could be expanded to multiple jobs
            const jobInfo = {
                role: currentUser.role,
                location: currentUser.location,
                projectStart: currentUser.projectStart,
                rate: currentUser.rate,
                status: getJobStatus(currentUser.projectStart)
            };

            container.innerHTML = `
                <div class="job-card">
                    <div class="job-header">
                        <div>
                            <h3>${jobInfo.role}</h3>
                            <p class="job-location"><i class="fas fa-map-marker-alt"></i> ${jobInfo.location}</p>
                        </div>
                        <span class="job-status ${jobInfo.status.toLowerCase()}">${jobInfo.status}</span>
                    </div>
                    
                    <div class="job-details">
                        <div class="job-detail-item">
                            <i class="fas fa-clock"></i>
                            <div>
                                <strong>Project Start</strong>
                                <span>${jobInfo.projectStart}</span>
                            </div>
                        </div>
                        <div class="job-detail-item">
                            <i class="fas fa-dollar-sign"></i>
                            <div>
                                <strong>Rate</strong>
                                <span>${jobInfo.rate}</span>
                            </div>
                        </div>
                        <div class="job-detail-item">
                            <i class="fas fa-handshake"></i>
                            <div>
                                <strong>Contract Status</strong>
                                <span class="contract-status">Ready to Sign</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="job-actions">
                        <a href="contract.html" class="btn job-action-btn">
                            <i class="fas fa-file-contract"></i> View Contract
                        </a>
                        <button class="btn job-action-btn secondary" onclick="viewJobDetails()">
                            <i class="fas fa-info-circle"></i> Job Details
                        </button>
                    </div>
                </div>
                
                <div class="job-timeline">
                    <div class="timeline-header">
                        <h4><i class="fas fa-history"></i> Project Timeline</h4>
                        <div class="progress-indicator">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${getProjectProgress()}%"></div>
                            </div>
                            <span class="progress-text">${getProjectProgress()}% Complete</span>
                        </div>
                    </div>
                    
                    <div class="current-status">
                        <div class="status-card">
                            <div class="status-icon">
                                <i class="${getCurrentTimelineStep().icon}"></i>
                            </div>
                            <div class="status-content">
                                <h5>Current Step: ${getCurrentTimelineStep().title}</h5>
                                <p>${getCurrentTimelineStep().description}</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="timeline">
                        ${getProjectTimeline().map(step => `
                            <div class="timeline-item ${step.status}" data-step="${step.id}">
                                <div class="timeline-icon">
                                    <i class="${step.icon}"></i>
                                </div>
                                <div class="timeline-content">
                                    <div class="timeline-main">
                                        <strong>${step.title}</strong>
                                        <span>${step.description}</span>
                                        ${step.date ? `<small class="timeline-date">${step.date.toLocaleDateString()}</small>` : ''}
                                    </div>
                                    
                                    ${step.status === 'current' ? `
                                        <div class="timeline-details">
                                            <p>${step.details}</p>
                                            ${step.action ? `
                                                <a href="${step.action.url}" class="timeline-action">
                                                    <i class="${step.action.icon}"></i> ${step.action.text}
                                                </a>
                                            ` : ''}
                                            ${step.checklist ? `
                                                <div class="timeline-checklist">
                                                    <h6>📋 Preparation Checklist:</h6>
                                                    <ul>
                                                        ${step.checklist.map(item => `<li>${item}</li>`).join('')}
                                                    </ul>
                                                </div>
                                            ` : ''}
                                            ${step.requirements ? `
                                                <div class="timeline-requirements">
                                                    <h6>📝 Requirements:</h6>
                                                    <ul>
                                                        ${step.requirements.map(item => `<li>${item}</li>`).join('')}
                                                    </ul>
                                                </div>
                                            ` : ''}
                                        </div>
                                    ` : ''}
                                    
                                    <button class="timeline-expand" onclick="toggleTimelineDetails('${step.id}')">
                                        <i class="fas fa-chevron-down"></i> ${step.status === 'current' ? 'Hide' : 'Show'} Details
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // Helper function to determine job status
        function getJobStatus(projectStart) {
            if (!projectStart || projectStart === 'TBD') return 'PENDING';
            
            const startDate = new Date(projectStart);
            const now = new Date();
            
            if (startDate > now) return 'UPCOMING';
            if (startDate <= now) return 'ACTIVE';
            return 'COMPLETED';
        }

        // Helper function to check if contract is signed
        function getContractSignedStatus() {
            // Check if user has signed contracts
            const userContracts = uploadedContracts.filter(contract => 
                contract.freelancerEmail.toLowerCase() === currentUser.email.toLowerCase()
            );
            return userContracts.length > 0 ? 'completed' : 'current';
        }

        // Get detailed project timeline with current status
        function getProjectTimeline() {
            if (!currentUser) return [];
            
            const contractSigned = getContractSignedStatus() === 'completed';
            const jobStatus = getJobStatus(currentUser.projectStart);
            const now = new Date();
            let projectStartDate = null;
            
            // Parse project start date
            try {
                if (currentUser.projectStart && currentUser.projectStart !== 'TBD') {
                    // Handle various date formats
                    const dateStr = currentUser.projectStart.replace(/(\d+)(st|nd|rd|th)/, '$1');
                    projectStartDate = new Date(dateStr);
                }
            } catch (e) {
                console.warn('Could not parse project start date:', currentUser.projectStart);
            }
            
            const timeline = [
                {
                    id: 'application',
                    title: 'Application Approved',
                    description: 'You\'ve been accepted for this role',
                    icon: 'fas fa-check',
                    status: 'completed',
                    date: currentUser.approvedDate ? new Date(currentUser.approvedDate) : null,
                    details: `Congratulations! You were selected for the ${currentUser.role} position.`
                },
                {
                    id: 'contract',
                    title: 'Contract Signing',
                    description: contractSigned ? 'Contract successfully signed' : 'Sign your freelance agreement',
                    icon: 'fas fa-signature',
                    status: contractSigned ? 'completed' : 'current',
                    date: contractSigned ? new Date() : null, // We could store actual signing date
                    details: contractSigned ? 
                        'Your contract has been signed and processed. All terms are now in effect.' : 
                        'Please review and sign your freelance contract to proceed with the project.',
                    action: contractSigned ? null : {
                        text: 'Sign Contract Now',
                        url: 'contract.html',
                        icon: 'fas fa-pen-fancy'
                    }
                },
                {
                    id: 'preparation',
                    title: 'Project Preparation',
                    description: contractSigned ? 'Prepare for your project' : 'Awaiting contract signature',
                    icon: 'fas fa-clipboard-list',
                    status: contractSigned ? (jobStatus === 'UPCOMING' || jobStatus === 'ACTIVE' ? 'current' : 'pending') : 'pending',
                    date: null,
                    details: contractSigned ? 
                        'Review project requirements, prepare equipment, and confirm your availability.' : 
                        'This phase will begin once your contract is signed.',
                    checklist: contractSigned ? [
                        'Review project requirements and location details',
                        'Prepare and check all necessary equipment',
                        'Confirm transportation and arrival plans',
                        'Review Cochran Films brand guidelines',
                        'Prepare professional attire (all black required)'
                    ] : null
                },
                {
                    id: 'project',
                    title: 'Project Execution',
                    description: projectStartDate ? `Starts ${currentUser.projectStart}` : 'Project start date TBD',
                    icon: 'fas fa-play-circle',
                    status: jobStatus === 'ACTIVE' ? 'current' : (jobStatus === 'COMPLETED' ? 'completed' : 'pending'),
                    date: projectStartDate,
                    details: jobStatus === 'ACTIVE' ? 
                        'Your project is currently in progress. Follow all guidelines and maintain professional standards.' :
                        jobStatus === 'COMPLETED' ? 
                        'Project completed successfully! Thank you for your excellent work.' :
                        `Your project is scheduled to begin on ${currentUser.projectStart}.`,
                    requirements: jobStatus !== 'COMPLETED' ? [
                        'Arrive 15 minutes before start time',
                        'Bring valid ID and signed contract',
                        'Wear all black professional attire',
                        'Use provided Cochran Films branded gear',
                        'Maintain professional demeanor at all times'
                    ] : null
                },
                {
                    id: 'completion',
                    title: 'Project Completion & Payment',
                    description: jobStatus === 'COMPLETED' ? 'Project completed - payment processed' : 'Payment within 24 hours of completion',
                    icon: 'fas fa-money-bill-wave',
                    status: jobStatus === 'COMPLETED' ? 'completed' : 'pending',
                    date: jobStatus === 'COMPLETED' ? new Date() : null, // Could track actual completion date
                    details: jobStatus === 'COMPLETED' ? 
                        `Payment of ${currentUser.rate} has been processed. Thank you for your outstanding work!` :
                        `You will receive payment of ${currentUser.rate} within 24 hours of project completion.`
                }
            ];
            
            return timeline;
        }

        // Get current step in timeline
        function getCurrentTimelineStep() {
            const timeline = getProjectTimeline();
            const currentStep = timeline.find(step => step.status === 'current');
            return currentStep || timeline[timeline.length - 1];
        }

        // Calculate overall progress percentage
        function getProjectProgress() {
            const timeline = getProjectTimeline();
            const completedSteps = timeline.filter(step => step.status === 'completed').length;
            return Math.round((completedSteps / timeline.length) * 100);
        }

        // Toggle timeline details
        function toggleTimelineDetails(stepId) {
            const timelineItem = document.querySelector(`[data-step="${stepId}"]`);
            const detailsSection = timelineItem.querySelector('.timeline-details');
            const expandButton = timelineItem.querySelector('.timeline-expand');
            const icon = expandButton.querySelector('i');
            
            if (detailsSection) {
                // Toggle existing details
                if (detailsSection.style.display === 'none' || !detailsSection.style.display) {
                    detailsSection.style.display = 'block';
                    expandButton.innerHTML = '<i class="fas fa-chevron-up"></i> Hide Details';
                } else {
                    detailsSection.style.display = 'none';
                    expandButton.innerHTML = '<i class="fas fa-chevron-down"></i> Show Details';
                }
            } else {
                // Create and show details for non-current steps
                const timeline = getProjectTimeline();
                const step = timeline.find(s => s.id === stepId);
                
                if (step) {
                    const timelineContent = timelineItem.querySelector('.timeline-content');
                    const newDetails = document.createElement('div');
                    newDetails.className = 'timeline-details';
                    newDetails.innerHTML = `
                        <p>${step.details}</p>
                        ${step.checklist ? `
                            <div class="timeline-checklist">
                                <h6>📋 Preparation Checklist:</h6>
                                <ul>
                                    ${step.checklist.map(item => `<li>${item}</li>`).join('')}
                                </ul>
                            </div>
                        ` : ''}
                        ${step.requirements ? `
                            <div class="timeline-requirements">
                                <h6>📝 Requirements:</h6>
                                <ul>
                                    ${step.requirements.map(item => `<li>${item}</li>`).join('')}
                                </ul>
                            </div>
                        ` : ''}
                    `;
                    
                    timelineContent.insertBefore(newDetails, expandButton);
                    expandButton.innerHTML = '<i class="fas fa-chevron-up"></i> Hide Details';
                }
            }
        }

        // View job details function
        function viewJobDetails() {
            if (!currentUser) return;
            
            const currentStep = getCurrentTimelineStep();
            const progress = getProjectProgress();
            
            const details = `
🎬 COCHRAN FILMS - JOB DETAILS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

📊 PROJECT PROGRESS: ${progress}% Complete
🎯 CURRENT PHASE: ${currentStep.title}

📋 ROLE INFORMATION:
Position: ${currentUser.role}
Location: ${currentUser.location}
Start Date: ${currentUser.projectStart}
Rate: ${currentUser.rate}

💼 PROJECT REQUIREMENTS:
• Arrive on time and professionally dressed
• Bring your own equipment (unless arranged)
• Maintain professional demeanor
• Complete assigned tasks to high standards
• Wear company-branded gear (provided free)
• All black attire required

📧 CONTACT:
For questions about this job, contact:
Email: info@cochranfilms.com

🔗 CURRENT STEP:
${currentStep.details}

${currentStep.action ? `⚡ ACTION REQUIRED: ${currentStep.action.text}` : ''}
            `.trim();
            
            alert(details);
        }

        // Download contract for user
        function downloadUserContract(index) {
            const userContracts = uploadedContracts.filter(contract => 
                contract.freelancerEmail.toLowerCase() === currentUser.email.toLowerCase()
            );
            const contract = userContracts[index];
            
            if (!contract || !contract.fileData) {
                alert('❌ Contract file not available.');
                return;
            }
            
            const link = document.createElement('a');
            link.href = contract.fileData;
            link.download = contract.fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // View contract details
        function viewContractDetails(index) {
            const userContracts = uploadedContracts.filter(contract => 
                contract.freelancerEmail.toLowerCase() === currentUser.email.toLowerCase()
            );
            const contract = userContracts[index];
            
            const details = `
Contract Details:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Contract ID: ${contract.contractId}
Freelancer: ${contract.freelancerName}
Email: ${contract.freelancerEmail}
Role: ${contract.role}
Rate: ${contract.rate}
Location: ${contract.location}
Contract Date: ${contract.contractDate || 'Not specified'}
Upload Date: ${new Date(contract.uploadDate).toLocaleString()}
Status: ${contract.status}

${contract.notes ? `Notes: ${contract.notes}` : ''}
            `.trim();
            
            alert(details);
        }

        // Logout
        function logout() {
            sessionStorage.removeItem('userPortalAuthenticated');
            showLoginScreen();
        }

        // Tab switching functionality
        function switchPortalTab(tabName) {
            // Remove active class from all tabs and buttons
            document.querySelectorAll('.portal-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            // Add active class to selected tab and button
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
            
            console.log('📑 Switched to tab:', tabName);
        }

        // Check authentication on page load
        function checkAuth() {
            const savedUser = sessionStorage.getItem('userPortalAuthenticated');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    showUserPortal();
                } catch (error) {
                    showLoginScreen();
                }
            } else {
                showLoginScreen();
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadFreelancerData();
            loadUploadedContracts();
            checkAuth();
            
            // Add login form handler
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', handleLogin);
            }
        });
    </script>

    <style>
        :root {
            --primary: #FFB200;
            --primary-dark: #FF9000;
            --gold: #FFD700;
            --black: #000000;
            --white: #ffffff;
            --gray-light: #f8f9fa;
            --gray-medium: #6c757d;
            --gray-dark: #343a40;
            --border-radius: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.15);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Login Screen */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            position: relative;
            overflow: hidden;
        }
        
        .login-container {
            background: rgba(0, 0, 0, 0.8);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,178,0,0.2);
            text-align: center;
            max-width: 450px;
            width: 100%;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,178,0,0.3);
        }
        
        .login-logo {
            width: 140px;
            height: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 3px #FFB200) drop-shadow(0 0 6px #FFB200) drop-shadow(2px 2px 0px #000000);
        }
        
        .login-title {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #FFB200;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(255,178,0,0.3);
        }
        
        .login-subtitle {
            color: rgba(255,255,255,0.8);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #FFB200;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 178, 0, 0.3);
            border-radius: 8px;
            font-size: 1rem;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .form-group input:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.6);
            border-color: #FFB200;
            box-shadow: 0 0 0 2px rgba(255, 178, 0, 0.2);
        }
        
        .btn {
            background: linear-gradient(135deg, #FFB200, #FFD700);
            color: #000;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,178,0,0.4);
        }
        
        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        
        /* User Portal */
        .user-portal {
            display: none;
            min-height: 100vh;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            padding: 2rem;
            position: relative;
        }
        
        .user-portal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 50%, rgba(255,178,0,0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .portal-header {
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,178,0,0.2);
            position: relative;
            z-index: 2;
        }
        
        .portal-header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: #FFB200;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(255,178,0,0.3);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes titleGlow {
            0% { text-shadow: 0 2px 10px rgba(255,178,0,0.3); }
            100% { text-shadow: 0 2px 15px rgba(255,178,0,0.5); }
        }
        
        .portal-header p {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
        }
        
        .logout-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .logout-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: #FFB200;
            transform: translateY(-1px);
        }
        
        .portal-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        
        .info-card, .contract-card {
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem;
            border-radius: 16px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,178,0,0.2);
            margin-bottom: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .info-card::before, .contract-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(255,178,0,0.05) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .info-card:hover, .contract-card:hover {
            border-color: #FFB200;
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(255,178,0,0.15);
        }
        
        .info-card:hover::before, .contract-card:hover::before {
            opacity: 1;
        }
        
        .info-card h3, .contract-card h4 {
            color: #FFB200;
            margin-bottom: 1rem;
            font-family: 'Cinzel', serif;
            position: relative;
            z-index: 2;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            font-size: 0.9rem;
            position: relative;
            z-index: 2;
        }
        
        .info-grid > div {
            background: rgba(255,178,0,0.05);
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid rgba(255,178,0,0.1);
            transition: all 0.3s ease;
        }
        
        .info-grid > div:hover {
            background: rgba(255,178,0,0.1);
            border-color: rgba(255,178,0,0.2);
            transform: scale(1.02);
        }
        
        .contract-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .status-badge {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        
        .contract-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .contract-actions {
            margin-top: 1rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: rgba(255,255,255,0.7);
        }
        
        .empty-state h3 {
            color: rgba(255,255,255,0.9);
            margin-bottom: 1rem;
        }
        
        /* Tab Navigation */
        .tab-navigation {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 178, 0, 0.3);
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: rgba(255, 178, 0, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 178, 0, 0.3);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,178,0,0.3), transparent);
            transition: left 0.6s ease;
        }

        .tab-btn:hover::before {
            left: 100%;
        }

        .tab-btn:hover {
            background: rgba(255, 178, 0, 0.2);
            border-color: rgba(255, 178, 0, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255,178,0,0.2);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #FFB200, #FFD700);
            color: #000;
            border-color: #FFB200;
            box-shadow: 0 0 0 2px rgba(255, 178, 0, 0.2);
            transform: translateY(-1px);
        }
        
        .portal-tab {
            display: none; /* Hidden by default */
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .portal-tab.active {
            display: block; /* Show when active */
            opacity: 1;
            transform: translateY(0);
            animation: fadeInUp 0.5s ease-out;
        }
        
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Job Card Styles */
        .job-card {
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem;
            border-radius: 16px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,178,0,0.2);
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .job-header h3 {
            color: #FFB200;
            font-family: 'Cinzel', serif;
            margin-bottom: 0.25rem;
        }

        .job-location {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .job-status {
            background: rgba(255, 178, 0, 0.1);
            color: #FFB200;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .job-status.upcoming {
            background: rgba(255, 178, 0, 0.05);
            color: #FFB200;
        }

        .job-status.active {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }

        .job-status.completed {
            background: rgba(34, 197, 94, 0.05);
            color: #22c55e;
        }

        .job-status.pending {
            background: rgba(255, 178, 0, 0.05);
            color: #FFB200;
        }

        .job-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .job-detail-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .job-detail-item i {
            color: #FFB200;
            font-size: 1rem;
        }

        .job-detail-item strong {
            color: #FFB200;
            font-family: 'Cinzel', serif;
        }

        .job-detail-item span {
            color: rgba(255,255,255,0.7);
        }

        .job-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .job-action-btn {
            flex: 1;
            text-align: center;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
        }

        .job-action-btn.secondary {
            background: rgba(255, 178, 0, 0.05);
            color: #FFB200;
            border: 1px solid rgba(255, 178, 0, 0.2);
        }

        .job-action-btn.secondary:hover {
            background: rgba(255, 178, 0, 0.1);
            border-color: rgba(255, 178, 0, 0.3);
        }

        /* Job Timeline Styles */
        .job-timeline {
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem;
            border-radius: 16px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,178,0,0.2);
            margin-top: 1.5rem;
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .timeline-header h4 {
            color: #FFB200;
            font-family: 'Cinzel', serif;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .progress-indicator {
            display: flex;
            align-items: center;
            gap: 1rem;
            min-width: 200px;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 178, 0, 0.2);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFB200, #FFD700);
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: progressShimmer 2s infinite;
        }

        @keyframes progressShimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            color: #FFB200;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .current-status {
            margin-bottom: 2rem;
        }

        .status-card {
            background: linear-gradient(135deg, rgba(255, 178, 0, 0.1), rgba(255, 178, 0, 0.05));
            border: 1px solid rgba(255, 178, 0, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: statusPulse 3s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 178, 0, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(255, 178, 0, 0); }
        }

        .status-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #FFB200, #FFD700);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #000;
            flex-shrink: 0;
        }

        .status-content h5 {
            color: #FFB200;
            font-family: 'Cinzel', serif;
            margin: 0 0 0.5rem 0;
            font-size: 1.1rem;
        }

        .status-content p {
            color: rgba(255, 255, 255, 0.8);
            margin: 0;
        }

        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255, 178, 0, 0.3);
            border-radius: 2px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -0.75rem;
            top: 0.5rem;
            width: 1.5rem;
            height: 1.5rem;
            background: rgba(255, 178, 0, 0.1);
            border-radius: 50%;
            border: 2px solid #FFB200;
        }

        .timeline-item.completed::before {
            background: rgba(34, 197, 94, 0.2);
            border-color: #22c55e;
        }

        .timeline-item.current::before {
            background: rgba(255, 178, 0, 0.2);
            border-color: #FFB200;
        }

        .timeline-item.pending::before {
            background: rgba(255, 178, 0, 0.1);
            border-color: #FFB200;
        }

        .timeline-icon {
            position: absolute;
            left: -1.5rem;
            top: 0.5rem;
            width: 2rem;
            height: 2rem;
            background: rgba(255, 178, 0, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #FFB200;
        }

        .timeline-icon i {
            font-size: 1rem;
            color: #FFB200;
        }

        .timeline-content {
            background: rgba(0, 0, 0, 0.6);
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255, 178, 0, 0.1);
            transition: all 0.3s ease;
        }

        .timeline-item.current .timeline-content {
            background: rgba(255, 178, 0, 0.05);
            border-color: rgba(255, 178, 0, 0.3);
        }

        .timeline-main {
            margin-bottom: 1rem;
        }

        .timeline-content strong {
            color: #FFB200;
            font-family: 'Cinzel', serif;
            display: block;
            margin-bottom: 0.25rem;
        }

        .timeline-content span {
            color: rgba(255,255,255,0.7);
            display: block;
        }

        .timeline-date {
            color: rgba(255, 178, 0, 0.8);
            font-size: 0.8rem;
            margin-top: 0.25rem;
            display: block;
        }

        .timeline-details {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 178, 0, 0.2);
        }

        .timeline-details p {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .timeline-action {
            display: inline-block;
            background: linear-gradient(135deg, #FFB200, #FFD700);
            color: #000;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin: 1rem 0;
            transition: all 0.3s ease;
        }

        .timeline-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 178, 0, 0.4);
        }

        .timeline-checklist, .timeline-requirements {
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            border-left: 3px solid #FFB200;
        }

        .timeline-checklist h6, .timeline-requirements h6 {
            color: #FFB200;
            font-family: 'Cinzel', serif;
            margin: 0 0 0.75rem 0;
            font-size: 0.9rem;
        }

        .timeline-checklist ul, .timeline-requirements ul {
            margin: 0;
            padding-left: 1.25rem;
            list-style: none;
        }

        .timeline-checklist li, .timeline-requirements li {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.5rem;
            position: relative;
            line-height: 1.4;
        }

        .timeline-checklist li::before {
            content: '✓';
            color: #22c55e;
            font-weight: bold;
            position: absolute;
            left: -1.25rem;
        }

        .timeline-requirements li::before {
            content: '•';
            color: #FFB200;
            font-weight: bold;
            position: absolute;
            left: -1.25rem;
        }

        .timeline-expand {
            background: rgba(255, 178, 0, 0.1);
            color: #FFB200;
            border: 1px solid rgba(255, 178, 0, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 1rem;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .timeline-expand:hover {
            background: rgba(255, 178, 0, 0.2);
            border-color: rgba(255, 178, 0, 0.5);
        }
        
        @media (max-width: 768px) {
            .portal-content {
                grid-template-columns: 1fr;
            }
            
            .info-grid, .contract-details, .job-details {
                grid-template-columns: 1fr;
            }
            
            .job-actions {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .timeline-header {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }
            
            .progress-indicator {
                min-width: auto;
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .status-card {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }
            
            .timeline {
                padding-left: 1.5rem;
            }
            
            .timeline-icon {
                left: -1.25rem;
                width: 1.5rem;
                height: 1.5rem;
            }
            
            .timeline-icon i {
                font-size: 0.8rem;
            }
            
            .timeline-checklist, .timeline-requirements {
                padding: 0.75rem;
                margin: 0.75rem 0;
            }
            
            .tab-navigation {
                justify-content: stretch;
            }
            
            .tab-btn {
                flex: 1;
                text-align: center;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <img src="Logo.png" alt="Cochran Films" class="login-logo">
            <h1 class="login-title">👤 Freelancer Portal</h1>
            <p class="login-subtitle">Access your contracts and project information</p>
            
            <div id="loginError" class="error-message">
                Invalid email or password. Please try again.
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn">🔐 Login</button>
            </form>
        </div>
    </div>

    <!-- User Portal -->
    <div id="userPortal" class="user-portal">
        <div class="portal-header">
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            <h1>Welcome, <span id="userName">User</span>!</h1>
            <p>Your personal freelancer portal</p>
        </div>

        <div class="portal-content">
            <!-- Tab Navigation -->
            <div class="tab-navigation">
                <button class="tab-btn active" onclick="switchPortalTab('profile')">
                    <i class="fas fa-user"></i> Profile
                </button>
                <button class="tab-btn" onclick="switchPortalTab('jobs')">
                    <i class="fas fa-briefcase"></i> Current Jobs
                </button>
                <button class="tab-btn" onclick="switchPortalTab('contracts')">
                    <i class="fas fa-file-contract"></i> Contracts
                </button>
            </div>

            <!-- Profile Tab -->
            <div id="profile-tab" class="portal-tab active">
                <div id="userInfo">
                    <!-- User info will be populated here -->
                </div>
            </div>
            
            <!-- Current Jobs Tab -->
            <div id="jobs-tab" class="portal-tab">
                <h2 style="color: #FFB200; margin-bottom: 1rem; font-family: 'Cinzel', serif;">💼 Your Current Jobs</h2>
                <div id="userJobs">
                    <!-- Jobs will be populated here -->
                </div>
            </div>
            
            <!-- Contracts Tab -->
            <div id="contracts-tab" class="portal-tab">
                <h2 style="color: #FFB200; margin-bottom: 1rem; font-family: 'Cinzel', serif;">📋 Your Contracts</h2>
                <div id="userContracts">
                    <!-- Contracts will be populated here -->
                </div>
            </div>
        </div>
    </div>
</body>
</html>

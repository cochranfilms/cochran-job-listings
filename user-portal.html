<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Portal | Cochran Films</title>
    
    <!-- Favicon -->
    <link rel="icon" href="Favicon.png" type="image/png">
    
    <!-- Fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        let currentUser = null;
        let freelancers = [];
        let uploadedContracts = [];

        // Load freelancer data from JSON file
        async function loadFreelancerData() {
            try {
                // First, try to load directly from freelancers.json file (prevent caching)
                try {
                    const timestamp = new Date().getTime();
                    const response = await fetch(`freelancers.json?t=${timestamp}`);
                    if (response.ok) {
                        const jsonData = await response.json();
                        if (jsonData.approvedFreelancers) {
                            // Convert the JSON structure to array format with job support
                            freelancers = Object.entries(jsonData.approvedFreelancers).map(([name, freelancer]) => ({
                                name: name,
                                email: freelancer.email,
                                password: freelancer.password,
                                approvedDate: freelancer.approvedDate,
                                contractUrl: freelancer.contractUrl || 'contract.html',
                                // CONTRACT STATUS FIELDS - CRITICAL!
                                contractStatus: freelancer.contractStatus || 'pending',
                                contractSignedDate: freelancer.contractSignedDate,
                                contractUploadedDate: freelancer.contractUploadedDate,
                                contractId: freelancer.contractId,
                                // Handle both old single job format and new multiple jobs format
                                jobs: freelancer.jobs || [{
                                    id: 'legacy-job',
                                    role: freelancer.role,
                                    location: freelancer.location,
                                    projectStart: freelancer.projectStart,
                                    rate: freelancer.rate,
                                    status: 'upcoming',
                                    projectType: 'Legacy Job',
                                    description: `${freelancer.role} position`
                                }],
                                primaryJob: freelancer.primaryJob || 'legacy-job'
                            }));
                            
                            console.log('✅ Freelancer data loaded from JSON file:', freelancers.length, 'freelancers');
                            console.log('🔍 Available freelancers with jobs and contract status:', freelancers.map(f => ({ 
                                name: f.name, 
                                email: f.email, 
                                jobCount: f.jobs.length,
                                contractStatus: f.contractStatus,
                                contractId: f.contractId
                            })));
                            return;
                        }
                    }
                } catch (fetchError) {
                    console.warn('⚠️ Could not fetch freelancers.json, trying localStorage...', fetchError);
                }
                
                // Fallback: Try to load from localStorage (admin dashboard format)
                let data = JSON.parse(localStorage.getItem('freelancers') || '[]');
                
                // If localStorage is empty or not an array, try to load from JSON file structure in localStorage
                if (!Array.isArray(data) || data.length === 0) {
                    const jsonData = localStorage.getItem('approvedFreelancers');
                    if (jsonData) {
                        const parsedJsonData = JSON.parse(jsonData);
                        if (parsedJsonData.approvedFreelancers) {
                            // Convert the JSON structure to array format
                            data = Object.entries(parsedJsonData.approvedFreelancers).map(([name, freelancer]) => ({
                                name: name,
                                email: freelancer.email,
                                password: freelancer.password,
                                approvedDate: freelancer.approvedDate,
                                contractUrl: freelancer.contractUrl || 'contract.html',
                                // CONTRACT STATUS FIELDS - CRITICAL!
                                contractStatus: freelancer.contractStatus || 'pending',
                                contractSignedDate: freelancer.contractSignedDate,
                                contractUploadedDate: freelancer.contractUploadedDate,
                                contractId: freelancer.contractId,
                                jobs: freelancer.jobs || [{
                                    id: 'legacy-job',
                                    role: freelancer.role,
                                    location: freelancer.location,
                                    projectStart: freelancer.projectStart,
                                    rate: freelancer.rate,
                                    status: 'upcoming',
                                    projectType: 'Legacy Job',
                                    description: `${freelancer.role} position`
                                }],
                                primaryJob: freelancer.primaryJob || 'legacy-job'
                            }));
                        }
                    } else {
                        // Final fallback: hardcoded data with job structure
                        data = [
                            {
                                name: "Francisco Flores",
                                email: "ciscocinema@gmail.com",
                                password: "Cinema2025",
                                approvedDate: "2024-01-08",
                                contractUrl: "contract.html",
                                contractStatus: "pending",
                                contractSignedDate: null,
                                contractUploadedDate: null,
                                contractId: null,
                                jobs: [{
                                    id: 'job-francisco-001',
                                    role: "Backdrop Photographer",
                                    location: "6695 Church Street, Douglasville, GA 30134",
                                    projectStart: "November 8, 2025 at 3:15 PM",
                                    rate: "$400.00 USD (Flat)",
                                    status: 'upcoming',
                                    projectType: 'Photography',
                                    description: 'Backdrop photography for corporate event'
                                }],
                                primaryJob: 'job-francisco-001'
                            },
                            {
                                name: "Test User",
                                email: "codylcochran87@gmail.com",
                                password: "Test12345",
                                approvedDate: "2025-04-13",
                                contractUrl: "contract.html",
                                contractStatus: "pending",
                                contractSignedDate: null,
                                contractUploadedDate: null,
                                contractId: null,
                                jobs: [
                                    {
                                        id: "job-001",
                                        role: "Video Editor",
                                        location: "Atlanta, GA",
                                        projectStart: "August 19th, 2025 at 2:00pm",
                                        rate: "$450.00 USD (Flat)",
                                        status: "upcoming",
                                        projectType: "Corporate Video",
                                        description: "Edit promotional video for tech startup"
                                    },
                                    {
                                        id: "job-002", 
                                        role: "Drone Operator",
                                        location: "Savannah, GA",
                                        projectStart: "September 15th, 2025 at 10:00am",
                                        rate: "$600.00 USD (Flat)",
                                        status: "upcoming",
                                        projectType: "Real Estate",
                                        description: "Aerial shots for luxury property showcase"
                                    }
                                ],
                                primaryJob: "job-001"
                            },
                            {
                                name: "Hannah Aryee",
                                email: "hannah@luciacreates.co",
                                password: "Collaboration2025",
                                approvedDate: "2025-08-01",
                                contractUrl: "contract.html",
                                contractStatus: "pending",
                                contractSignedDate: null,
                                contractUploadedDate: null,
                                contractId: null,
                                jobs: [{
                                    id: 'job-hannah-001',
                                    role: "Backdrop Photographer",
                                    location: "6700 Church Street, Douglasville, GA,  30134",
                                    projectStart: "October 24, 2025 at 3:15 PM",
                                    rate: "$300 + Tip",
                                    status: 'upcoming',
                                    projectType: 'Photography',
                                    description: 'Backdrop photography session'
                                }],
                                primaryJob: 'job-hannah-001'
                            }
                        ];
                    }
                }
                
                freelancers = data;
                console.log('✅ Freelancer data loaded from localStorage/fallback:', freelancers.length, 'freelancers');
                console.log('🔍 Available freelancers:', freelancers.map(f => ({ name: f.name, email: f.email, jobCount: f.jobs?.length || 0 })));
            } catch (error) {
                console.error('❌ Error loading freelancer data:', error);
                freelancers = [];
            }
        }

        // Load uploaded contracts from JSON file
        async function loadUploadedContracts() {
            try {
                // Try to load from uploaded-contracts.json file
                const response = await fetch('uploaded-contracts.json');
                if (response.ok) {
                    const jsonData = await response.json();
                    uploadedContracts = jsonData.uploadedContracts || [];
                    console.log('✅ Uploaded contracts loaded from JSON file:', uploadedContracts.length, 'contracts');
                } else {
                    console.warn('⚠️ Could not load uploaded-contracts.json, falling back to localStorage');
                    const data = JSON.parse(localStorage.getItem('uploadedContracts') || '[]');
                    uploadedContracts = data;
                    console.log('✅ Uploaded contracts loaded from localStorage:', uploadedContracts.length, 'contracts');
                }
            } catch (error) {
                console.warn('⚠️ Error loading uploaded-contracts.json:', error);
                try {
                    const data = JSON.parse(localStorage.getItem('uploadedContracts') || '[]');
                    uploadedContracts = data;
                    console.log('✅ Uploaded contracts loaded from localStorage fallback:', uploadedContracts.length, 'contracts');
                } catch (localStorageError) {
                    console.error('❌ Error loading uploaded contracts:', localStorageError);
                    uploadedContracts = [];
                }
            }
        }

        // Handle login
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            // Find user in freelancers data
            const user = freelancers.find(f => f.email.toLowerCase() === email.toLowerCase() && f.password === password);
            
            if (user) {
                currentUser = user;
                sessionStorage.setItem('userPortalAuthenticated', JSON.stringify(user));
                showUserPortal();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // Show user portal
        function showUserPortal() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('userPortal').style.display = 'block';
            loadUserData();
        }

        // Show login screen
        function showLoginScreen() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('userPortal').style.display = 'none';
            currentUser = null;
        }

        // Load user-specific data
        function loadUserData() {
            if (!currentUser) return;

            // Update welcome message
            document.getElementById('userName').textContent = currentUser.name;
            
            // Display user info
            displayUserInfo();
            displayUserContracts();
            displayUserJobs();
        }

        // Display user information
        function displayUserInfo() {
            const container = document.getElementById('userInfo');
            
            // Get all jobs for this user from the jobs array
            const userJobs = currentUser.jobs || [];
            const primaryJobId = currentUser.primaryJob;
            
            container.innerHTML = `
                <div class="profile-grid">
                    <!-- Contact Information Card -->
                    <div class="contact-info-card">
                        <h3><i class="fas fa-user-circle"></i> Contact Information</h3>
                        <div class="contact-details">
                            <div class="contact-item">
                                <i class="fas fa-user"></i>
                                <div>
                                    <strong>Full Name</strong>
                                    <span>${currentUser.name}</span>
                                </div>
                            </div>
                            <div class="contact-item">
                                <i class="fas fa-envelope"></i>
                                <div>
                                    <strong>Email Address</strong>
                                    <span>${currentUser.email}</span>
                                </div>
                            </div>
                            <div class="contact-item">
                                <i class="fas fa-calendar-check"></i>
                                <div>
                                    <strong>Approved Date</strong>
                                    <span>${new Date(currentUser.approvedDate || Date.now()).toLocaleDateString()}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Current Jobs Card -->
                    <div class="current-job-card">
                        <div class="job-header-section">
                            <h3><i class="fas fa-briefcase"></i> Your Assignments</h3>
                            <span class="job-count">${userJobs.length} Active Job${userJobs.length !== 1 ? 's' : ''}</span>
                        </div>
                        
                        <div class="job-selector">
                            ${userJobs.map((job, index) => `
                                <div class="job-option ${job.id === primaryJobId ? 'active' : ''}" onclick="selectJob(${index}, '${job.id}')">
                                    <div class="job-info">
                                        <div class="job-title">
                                            <i class="fas fa-${getJobIcon(job.projectType)}"></i>
                                            <strong>${job.role}</strong>
                                            ${job.id === primaryJobId ? '<span class="primary-badge">Primary</span>' : ''}
                                        </div>
                                        <div class="job-type">
                                            <i class="fas fa-tag"></i>
                                            <span>${job.projectType}</span>
                                        </div>
                                        <div class="job-description">
                                            <p>${job.description}</p>
                                        </div>
                                        <div class="job-details-grid">
                                            <div class="job-detail">
                                                <i class="fas fa-map-marker-alt"></i>
                                                <span>${job.location}</span>
                                            </div>
                                            <div class="job-detail">
                                                <i class="fas fa-dollar-sign"></i>
                                                <span>${job.rate}</span>
                                            </div>
                                            <div class="job-detail">
                                                <i class="fas fa-clock"></i>
                                                <span>${job.projectStart}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="job-status-indicator ${getJobStatus(job.projectStart).toLowerCase()}">
                                        ${getJobStatus(job.projectStart)}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="job-actions-section">
                            <button class="btn btn-primary" onclick="switchPortalTab('jobs')">
                                <i class="fas fa-tasks"></i> View Project Timeline
                            </button>
                            <button class="btn btn-secondary" onclick="viewJobDetails()">
                                <i class="fas fa-info-circle"></i> Job Details
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Get appropriate icon for job type
        function getJobIcon(projectType) {
            const iconMap = {
                'Corporate Video': 'video',
                'Real Estate': 'home',
                'Photography': 'camera',
                'Legacy Job': 'briefcase',
                'Drone': 'helicopter'
            };
            return iconMap[projectType] || 'briefcase';
        }
        
        // Track selected job
        let selectedJobIndex = 0;
        
        // Select a job and update context
        function selectJob(jobIndex, jobId) {
            selectedJobIndex = jobIndex;
            
            const jobOptions = document.querySelectorAll('.job-option');
            jobOptions.forEach((option, index) => {
                if (index === jobIndex) {
                    option.classList.add('active');
                } else {
                    option.classList.remove('active');
                }
            });
            
            console.log('Selected job:', jobIndex, jobId);
            
            // Update the jobs tab to show the selected job's timeline
            displayUserJobs();
        }
        
        // Get the currently selected job
        function getSelectedJob() {
            if (!currentUser || !currentUser.jobs) {
                return null;
            }
            return currentUser.jobs[selectedJobIndex] || currentUser.jobs[0];
        }

        // Display user contracts (centralized from freelancers.json)
        function displayUserContracts() {
            const container = document.getElementById('userContracts');
            
            if (!currentUser) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>❌ User Data Missing</h3>
                        <p>Unable to load contract information.</p>
                    </div>
                `;
                return;
            }

            const contractStatus = currentUser.contractStatus || 'pending';
            
            // Contract status based UI
            if (contractStatus === 'pending') {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="status-icon" style="font-size: 3rem; color: #FFB200; margin-bottom: 1rem;">
                            <i class="fas fa-pen-fancy"></i>
                        </div>
                        <h3>📋 Contract Ready for Signature</h3>
                        <p>Your contract is ready for digital signature. Please sign to proceed with your project.</p>
                        <a href="https://collaboration.cochranfilms.com/contract" class="btn" style="margin-top: 1rem;">
                            <i class="fas fa-signature"></i> Sign Contract Now
                        </a>
                    </div>
                `;
                return;
            }
            
            if (contractStatus === 'signed') {
                container.innerHTML = `
                    <div class="pending-state">
                        <div class="status-icon" style="font-size: 3rem; color: #FFB200; margin-bottom: 1rem;">
                            <i class="fas fa-clock"></i>
                        </div>
                        <h3>⏳ Contract Processing</h3>
                        <p>Thank you! Your contract has been digitally signed and is being processed by our admin team.</p>
                        <div style="background: rgba(255,178,0,0.1); padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0; border: 1px solid rgba(255,178,0,0.3);">
                            <h4 style="color: #FFB200; margin-bottom: 1rem;"><i class="fas fa-info-circle"></i> Status Details</h4>
                            <div style="color: rgba(255,255,255,0.9);">
                                <div><strong>Signed Date:</strong> ${currentUser.contractSignedDate || 'Processing...'}</div>
                                <div><strong>Contract ID:</strong> ${currentUser.contractId || 'Generating...'}</div>
                                <div><strong>Status:</strong> Awaiting admin processing</div>
                            </div>
                        </div>
                        <p style="color: rgba(255,255,255,0.8); font-size: 0.9rem;">
                            <i class="fas fa-clock"></i> You'll be able to download your contract once it's been uploaded by our admin team.
                        </p>
                    </div>
                `;
                return;
            }
            
            if (contractStatus === 'uploaded') {
                container.innerHTML = `
                    <div class="contract-card">
                        <div class="contract-header">
                            <h4><i class="fas fa-file-contract"></i> ${currentUser.jobs ? currentUser.jobs[0]?.role : currentUser.role}</h4>
                            <span class="status-badge signed">✅ SIGNED & PROCESSED</span>
                        </div>
                        <div class="contract-details">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                                <div><strong>Contract ID:</strong> ${currentUser.contractId || 'N/A'}</div>
                                <div><strong>Signed Date:</strong> ${currentUser.contractSignedDate || 'N/A'}</div>
                                <div><strong>Processed Date:</strong> ${currentUser.contractUploadedDate || 'N/A'}</div>
                                <div><strong>Rate:</strong> ${currentUser.jobs ? currentUser.jobs[0]?.rate : currentUser.rate}</div>
                            </div>
                            <div style="background: rgba(34, 197, 94, 0.1); padding: 1rem; border-radius: 8px; border: 1px solid rgba(34, 197, 94, 0.3);">
                                <p style="color: #22c55e; margin: 0; font-weight: 600;">
                                    <i class="fas fa-check-circle"></i> Your contract is fully executed and all terms are in effect.
                                </p>
                            </div>
                        </div>
                        <div class="contract-actions" style="margin-top: 1rem;">
                            <button class="btn btn-small btn-success" onclick="downloadUserContract()">
                                <i class="fas fa-download"></i> Download Contract PDF
                            </button>
                            <button class="btn btn-small" onclick="viewContractDetails()">
                                <i class="fas fa-eye"></i> View Details
                            </button>
                        </div>
                    </div>
                `;
                return;
            }
        }

        // Display user jobs
        function displayUserJobs() {
            const container = document.getElementById('userJobs');
            
            if (!currentUser) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>❌ User Data Missing</h3>
                        <p>Unable to load job information.</p>
                    </div>
                `;
                return;
            }

            // Get the selected job or fall back to primary job
            const selectedJob = getSelectedJob();
            if (!selectedJob) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>📋 No Jobs Available</h3>
                        <p>No job assignments found for your account.</p>
                    </div>
                `;
                return;
            }

            // Display the selected job's information
            const jobInfo = {
                role: selectedJob.role,
                location: selectedJob.location,
                projectStart: selectedJob.projectStart,
                rate: selectedJob.rate,
                status: getJobStatus(selectedJob.projectStart),
                projectType: selectedJob.projectType,
                description: selectedJob.description
            };

            // Add job selector if user has multiple jobs
            const jobSelectorHTML = currentUser.jobs && currentUser.jobs.length > 1 ? `
                <div class="job-selector-header">
                    <h3>Select Job to View Timeline:</h3>
                    <div class="job-tabs">
                        ${currentUser.jobs.map((job, index) => `
                            <button class="job-tab ${index === selectedJobIndex ? 'active' : ''}" 
                                    onclick="selectJob(${index}, '${job.id}')">
                                <i class="fas fa-${getJobIcon(job.projectType)}"></i>
                                ${job.role}
                                ${job.id === currentUser.primaryJob ? '<span class="primary-dot"></span>' : ''}
                            </button>
                        `).join('')}
                    </div>
                </div>
            ` : '';

            container.innerHTML = `
                ${jobSelectorHTML}
                <div class="job-card">
                    <div class="job-header">
                        <div>
                            <h3>${jobInfo.role}</h3>
                            <p class="job-location"><i class="fas fa-map-marker-alt"></i> ${jobInfo.location}</p>
                            <p class="job-type-info"><i class="fas fa-tag"></i> ${jobInfo.projectType}</p>
                        </div>
                        <span class="job-status ${jobInfo.status.toLowerCase()}">${jobInfo.status}</span>
                    </div>
                    
                    <div class="job-details">
                        <div class="job-detail-item">
                            <i class="fas fa-clock"></i>
                            <div>
                                <strong>Project Start</strong>
                                <span>${jobInfo.projectStart}</span>
                            </div>
                        </div>
                        <div class="job-detail-item">
                            <i class="fas fa-dollar-sign"></i>
                            <div>
                                <strong>Rate</strong>
                                <span>${jobInfo.rate}</span>
                            </div>
                        </div>
                        <div class="job-detail-item">
                            <i class="fas fa-handshake"></i>
                            <div>
                                <strong>Contract Status</strong>
                                <span class="contract-status ${getContractSignedStatus() === 'completed' ? 'signed' : 'pending'}">
                                    ${getContractSignedStatus() === 'completed' ? '✅ Signed' : '⏳ Ready to Sign'}
                                </span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="job-actions">
                        <button class="btn job-action-btn" onclick="switchPortalTab('contracts')">
                            <i class="fas fa-file-contract"></i> View Contract Status
                        </button>
                        <button class="btn job-action-btn secondary" onclick="viewJobDetails()">
                            <i class="fas fa-info-circle"></i> Job Details
                        </button>
                    </div>
                </div>
                
                <div class="job-timeline">
                    <div class="timeline-header">
                        <h4><i class="fas fa-history"></i> Project Timeline</h4>
                        <div class="progress-indicator">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${getProjectProgress()}%"></div>
                            </div>
                            <span class="progress-text">${getProjectProgress()}% Complete</span>
                        </div>
                    </div>
                    
                    <div class="current-status">
                        <div class="status-card">
                            <div class="status-icon">
                                <i class="${getCurrentTimelineStep().icon}"></i>
                            </div>
                            <div class="status-content">
                                <h5>Current Step: ${getCurrentTimelineStep().title}</h5>
                                <p>${getCurrentTimelineStep().description}</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="timeline">
                        ${getProjectTimeline().map(step => `
                            <div class="timeline-item ${step.status}" data-step="${step.id}">
                                <div class="timeline-icon">
                                    <i class="${step.icon}"></i>
                                </div>
                                <div class="timeline-content">
                                    <div class="timeline-main">
                                        <strong>${step.title}</strong>
                                        <span>${step.description}</span>
                                        ${step.date ? `<small class="timeline-date">${step.date.toLocaleDateString()}</small>` : ''}
                                    </div>
                                    
                                    ${step.status === 'current' ? `
                                        <div class="timeline-details">
                                            <p>${step.details}</p>
                                            ${step.action ? `
                                                ${step.action.url ? 
                                                    `<a href="${step.action.url}" class="timeline-action">
                                                        <i class="${step.action.icon}"></i> ${step.action.text}
                                                    </a>` :
                                                    `<button onclick="${step.action.onclick}" class="timeline-action" style="border: none; background: linear-gradient(135deg, #FFB200, #FFD700); color: #000; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;">
                                                        <i class="${step.action.icon}"></i> ${step.action.text}
                                                    </button>`
                                                }
                                            ` : ''}
                                            ${step.checklist ? `
                                                <div class="timeline-checklist">
                                                    <h6>📋 Preparation Checklist:</h6>
                                                    <ul>
                                                        ${step.checklist.map(item => `<li>${item}</li>`).join('')}
                                                    </ul>
                                                </div>
                                            ` : ''}

        // Helper function to determine job status
        function getJobStatus(projectStart) {
            if (!projectStart || projectStart === 'TBD') return 'PENDING';
            
            const startDate = new Date(projectStart);
            const now = new Date();
            
            if (startDate > now) return 'UPCOMING';
            if (startDate <= now) return 'ACTIVE';
            return 'COMPLETED';
        }

        // Helper function to check if contract is signed (single source of truth from freelancers.json)
        function getContractSignedStatus() {
            if (!currentUser) {
                console.log('📋 No current user for contract status check');
                return 'current';
            }
            
            // Use the contract status from the user's data (from freelancers.json)
            const contractStatus = currentUser.contractStatus || 'pending';
            
            console.log('📋 Contract status check for', currentUser.name, ':', {
                contractStatus: contractStatus,
                contractId: currentUser.contractId,
                signedDate: currentUser.contractSignedDate,
                uploadedDate: currentUser.contractUploadedDate,
                userObject: currentUser
            });
            
            // Only return 'completed' if admin has uploaded the contract (status = 'uploaded')
            // 'pending' = not signed yet  
            // 'signed' = digitally signed but not yet uploaded by admin
            // 'uploaded' = admin has uploaded the signed PDF (fully processed)
            const hasSignedContract = contractStatus === 'uploaded';
            
            console.log('📋 Final contract status result:', {
                hasSignedContract: hasSignedContract,
                returning: hasSignedContract ? 'completed' : 'current'
            });
            
            return hasSignedContract ? 'completed' : 'current';
        }

        // Get detailed project timeline with current status

            const timeline = [

        // Get current step in timeline
        function getCurrentTimelineStep() {
            const timeline = getProjectTimeline();
            const currentStep = timeline.find(step => step.status === 'current');
            return currentStep || timeline[timeline.length - 1];
        }

        // Calculate overall progress percentage (0%, 20%, 40%, 60%, 80%, 100%)
        function getProjectProgress() {
            const timeline = getProjectTimeline();
            const completedSteps = timeline.filter(step => step.status === 'completed').length;
            const currentSteps = timeline.filter(step => step.status === 'current').length;
            
            // Each step is worth 20% (5 total steps)
            const baseProgress = completedSteps * 20;
            
            // If there's a current step, add 50% of its value (10% for partial progress)
            const partialProgress = currentSteps > 0 ? 10 : 0;
            
            return Math.min(100, baseProgress + partialProgress);
        }

        // Toggle timeline details
        function toggleTimelineDetails(stepId) {
            const timelineItem = document.querySelector(`[data-step="${stepId}"]`);
            const detailsSection = timelineItem.querySelector('.timeline-details');
            const expandButton = timelineItem.querySelector('.timeline-expand');
            const icon = expandButton.querySelector('i');
            
            if (detailsSection) {
                // Toggle existing details
                if (detailsSection.style.display === 'none' || !detailsSection.style.display) {
                    detailsSection.style.display = 'block';
                    expandButton.innerHTML = '<i class="fas fa-chevron-up"></i> Hide Details';
                } else {
                    detailsSection.style.display = 'none';
                    expandButton.innerHTML = '<i class="fas fa-chevron-down"></i> Show Details';
                }
            } else {
                // Create and show details for non-current steps
                const timeline = getProjectTimeline();
                const step = timeline.find(s => s.id === stepId);
                
                if (step) {
                    const timelineContent = timelineItem.querySelector('.timeline-content');
                    const newDetails = document.createElement('div');
                    newDetails.className = 'timeline-details';
                    newDetails.innerHTML = `
                        <p>${step.details}</p>
                        ${step.checklist ? `
                            <div class="timeline-checklist">
                                <h6>📋 Preparation Checklist:</h6>
                                <ul>
                                    ${step.checklist.map(item => `<li>${item}</li>`).join('')}
                                </ul>
                            </div>
                        ` : ''}
                        ${step.requirements ? `
                            <div class="timeline-requirements">
                                <h6>📝 Requirements:</h6>
                                <ul>
                                    ${step.requirements.map(item => `<li>${item}</li>`).join('')}
                                </ul>
                            </div>
                        ` : ''}
                    `;
                    
                    timelineContent.insertBefore(newDetails, expandButton);
                    expandButton.innerHTML = '<i class="fas fa-chevron-up"></i> Hide Details';
                }
            }
        }

            font-family: 'Cinzel', serif;
            margin: 0 0 1rem 0;
            font-size: 1.1rem;
        }

        .step-details p {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .action-required {
            background: rgba(255, 178, 0, 0.1);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 178, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .action-required i {
            color: #FFB200;
        }

        .modal-action-btn {
            background: linear-gradient(135deg, #FFB200, #FFD700);
            color: #000;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-left: auto;
            transition: all 0.3s ease;
        }

        .modal-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 178, 0, 0.4);
        }

        .contact-section {
            background: rgba(0, 0, 0, 0.6);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 178, 0, 0.1);
            text-align: center;
        }

        .contact-section h4 {
            color: #FFB200;
            font-family: 'Cinzel', serif;
            margin: 0 0 1rem 0;
            font-size: 1.1rem;
        }

        .contact-section p {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 1rem;
        }

        .contact-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 178, 0, 0.1);
            color: #FFB200;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            border: 1px solid rgba(255, 178, 0, 0.3);
            transition: all 0.3s ease;
        }

        .contact-link:hover {
            background: rgba(255, 178, 0, 0.2);
            border-color: rgba(255, 178, 0, 0.5);
        }

        /* Profile Tab Styles */
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .contact-info-card, .current-job-card {
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem;
            border-radius: 16px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,178,0,0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .contact-info-card::before, .current-job-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(255,178,0,0.05) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .contact-info-card:hover, .current-job-card:hover {
            border-color: #FFB200;
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(255,178,0,0.15);
        }

        .contact-info-card:hover::before, .current-job-card:hover::before {
            opacity: 1;
        }

        .contact-info-card h3, .current-job-card h3 {
            color: #FFB200;
            margin-bottom: 1.5rem;
            font-family: 'Cinzel', serif;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .contact-details {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
            z-index: 2;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255,178,0,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,178,0,0.1);
            transition: all 0.3s ease;
        }

        .contact-item:hover {
            background: rgba(255,178,0,0.1);
            border-color: rgba(255,178,0,0.2);
            transform: scale(1.02);
        }

        .contact-item i {
            color: #FFB200;
            font-size: 1.2rem;
            width: 24px;
            flex-shrink: 0;
        }

        .contact-item div {
            flex: 1;
        }

        .contact-item strong {
            display: block;
            color: #FFB200;
            font-family: 'Cinzel', serif;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .contact-item span {
            color: rgba(255,255,255,0.9);
            font-size: 0.95rem;
        }

        .job-header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 2;
        }

        .job-count {
            background: rgba(255, 178, 0, 0.2);
            color: #FFB200;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(255, 178, 0, 0.3);
        }

        .job-selector {
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
        }

        .job-option {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 178, 0, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .job-option:hover {
            border-color: rgba(255, 178, 0, 0.5);
            background: rgba(255, 178, 0, 0.05);
            transform: translateY(-2px);
        }

        .job-option.active {
            border-color: #FFB200;
            background: rgba(255, 178, 0, 0.1);
            box-shadow: 0 0 0 2px rgba(255, 178, 0, 0.2);
        }

        .job-info {
            flex: 1;
        }

        .job-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .job-title i {
            color: #FFB200;
            font-size: 1.2rem;
        }

        .job-title strong {
            color: white;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
        }

        .job-details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem;
        }

        .job-detail {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .job-detail i {
            color: #FFB200;
            width: 16px;
            flex-shrink: 0;
        }

        .job-detail span {
            color: rgba(255,255,255,0.8);
        }

        .job-status-indicator {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .job-status-indicator.upcoming {
            background: rgba(255, 178, 0, 0.2);
            color: #FFB200;
            border: 1px solid rgba(255, 178, 0, 0.4);
        }

        .job-status-indicator.active {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.4);
        }

        .job-status-indicator.completed {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .job-status-indicator.pending {
            background: rgba(156, 163, 175, 0.2);
            color: #9ca3af;
            border: 1px solid rgba(156, 163, 175, 0.4);
        }

        .job-actions-section {
            display: flex;
            gap: 1rem;
            position: relative;
            z-index: 2;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFB200, #FFD700);
            color: #000;
        }

        .btn-secondary {
            background: rgba(255, 178, 0, 0.1);
            color: #FFB200;
            border: 1px solid rgba(255, 178, 0, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 178, 0, 0.2);
            border-color: rgba(255, 178, 0, 0.5);
        }

        /* Multiple Jobs UI */
        .primary-badge {
            background: linear-gradient(135deg, #FFB200, #FFD700);
            color: #000;
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .job-type {
            margin-bottom: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .job-type i {
            color: #FFB200;
        }

        .job-description {
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: rgba(255, 178, 0, 0.05);
            border-radius: 8px;
            border-left: 3px solid #FFB200;
        }

        .job-description p {
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
            font-style: italic;
            line-height: 1.4;
        }

        .job-selector-header {
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 178, 0, 0.2);
        }

        .job-selector-header h3 {
            color: #FFB200;
            font-family: 'Cinzel', serif;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .job-tabs {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .job-tab {
            background: rgba(255, 178, 0, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 178, 0, 0.3);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            font-weight: 500;
        }

        .job-tab:hover {
            background: rgba(255, 178, 0, 0.2);
            border-color: rgba(255, 178, 0, 0.5);
        }

        .job-tab.active {
            background: linear-gradient(135deg, #FFB200, #FFD700);
            color: #000;
            border-color: #FFB200;
        }

        .primary-dot {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid #000;
        }

        .job-type-info {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .job-type-info i {
            color: #FFB200;
        }
        
        @media (max-width: 768px) {
            .portal-content {
                grid-template-columns: 1fr;
            }
            
            .info-grid, .contract-details, .job-details {
                grid-template-columns: 1fr;
            }
            
            .job-actions {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .timeline-header {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }
            
            .progress-indicator {
                min-width: auto;
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .status-card {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }
            
            .timeline {
                padding-left: 1.5rem;
            }
            
            .timeline-icon {
                left: -1.25rem;
                width: 1.5rem;
                height: 1.5rem;
            }
            
            .timeline-icon i {
                font-size: 0.8rem;
            }
            
            .timeline-checklist, .timeline-requirements {
                padding: 0.75rem;
                margin: 0.75rem 0;
            }
            
            .tab-navigation {
                justify-content: stretch;
            }
            
            .tab-btn {
                flex: 1;
                text-align: center;
                justify-content: center;
            }
            
            /* Modal responsive */
            .modal-content {
                width: 95vw;
                max-height: 90vh;
            }
            
            .modal-header {
                padding: 1.5rem 1.5rem 1rem 1.5rem;
            }
            
            .modal-header h2 {
                font-size: 1.5rem;
            }
            
            .modal-body {
                padding: 1.5rem;
            }
            
            .job-info-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .action-required {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }
            
            .modal-action-btn {
                margin-left: 0;
                text-align: center;
            }
            
            /* Profile responsive */
            .profile-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            
            .contact-info-card, .current-job-card {
                padding: 1.5rem;
            }
            
            .job-details-grid {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
            
            .job-actions-section {
                flex-direction: column;
                gap: 0.75rem;
            }
            
            .job-option {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
                padding: 1.25rem;
            }
            
            .job-status-indicator {
                align-self: flex-start;
            }
            
            .job-tabs {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .job-tab {
                justify-content: center;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <img src="Logo.png" alt="Cochran Films" class="login-logo">
            <h1 class="login-title">👤 Freelancer Portal</h1>
            <p class="login-subtitle">Access your contracts and project information</p>
            
            <div id="loginError" class="error-message">
                Invalid email or password. Please try again.
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn">🔐 Login</button>
            </form>
        </div>
    </div>

    <!-- User Portal -->
    <div id="userPortal" class="user-portal">
        <div class="portal-header">
            <div style="position: absolute; top: 1rem; right: 1rem; display: flex; gap: 0.5rem;">
                <button class="refresh-btn" onclick="refreshUserData()" title="Refresh data from server">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
            <h1>Welcome, <span id="userName">User</span>!</h1>
            <p>Your personal freelancer portal</p>
        </div>

        <div class="portal-content">
            <!-- Tab Navigation -->
            <div class="tab-navigation">
                <button class="tab-btn active" onclick="switchPortalTab('profile')">
                    <i class="fas fa-user"></i> Profile
                </button>
                <button class="tab-btn" onclick="switchPortalTab('jobs')">
                    <i class="fas fa-briefcase"></i> Current Jobs
                </button>
                <button class="tab-btn" onclick="switchPortalTab('contracts')">
                    <i class="fas fa-file-contract"></i> Contracts
                </button>
            </div>

            <!-- Profile Tab -->
            <div id="profile-tab" class="portal-tab active">
                <div id="userInfo">
                    <!-- User info will be populated here -->
                </div>
            </div>
            
            <!-- Current Jobs Tab -->
            <div id="jobs-tab" class="portal-tab">
                <h2 style="color: #FFB200; margin-bottom: 1rem; font-family: 'Cinzel', serif;">💼 Your Current Jobs</h2>
                <div id="userJobs">
                    <!-- Jobs will be populated here -->
                </div>
            </div>
            
            <!-- Contracts Tab -->
            <div id="contracts-tab" class="portal-tab">
                <h2 style="color: #FFB200; margin-bottom: 1rem; font-family: 'Cinzel', serif;">📋 Your Contracts</h2>
                <div id="userContracts">
                    <!-- Contracts will be populated here -->
                </div>
            </div>
        </div>
    </div>
</body>
</html>
